<head>
<title>Weapon Position Tool</title>
<style>
  body { background:#1a1a2e; color:#fff; font-family:monospace; margin:20px; }
  canvas { display:block; border:2px solid #444; cursor:crosshair; }
  button { background:#334; color:#fff; border:1px solid #556; padding:6px 14px; cursor:pointer; font-family:monospace; font-size:13px; margin:2px; }
  button:hover { background:#446; }
  button.active { background:#363; border-color:#6a6; }
  .row { margin:8px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  #info { font-size:15px; margin:10px 0; color:#aaf; }
  #output { background:#0a0a1a; padding:12px; border:1px solid #333; white-space:pre; font-size:11px; max-height:300px; overflow-y:auto; margin-top:10px; }
  input[type=range] { width:250px; }
  input[type=number] { width:55px; background:#111; color:#ff0; border:1px solid #555; font-family:monospace; text-align:center; padding:3px; }

<h2>Weapon Shaft Position Tool</h2>
<div class="row" id="anim-btns">
  <button onclick="pick('idle')">IDLE (50)</button>
  <button onclick="pick('run')">RUN (22)</button>
  <button onclick="pick('attack')">ATTACK (96)</button>
  <button onclick="pick('smash')">SMASH (144)</button>
</div>
<div id="info">Select an animation above</div>
<div class="row">
  <button onclick="prev()">← Prev</button>
  <button onclick="next()">Next →</button>
  <label>Shaft slide:</label>
  <input type="range" id="slider" min="-30" max="30" value="0" oninput="slide()">
  <input type="number" id="numbox" value="0" oninput="numIn()">
</div>
<div class="row">
  <button onclick="copyAll()">Copy to all frames</button>
  <button onclick="resetF()">Reset frame</button>
  <button onclick="doExport()">Export TypeScript</button>
</div>

var Z = 6;
var cur = null;
var fi = 0;
var img = null;
var wimg = new Image();
wimg.src = BASE + '/assets/paladin/Weapons/Oak Mace.png';
var adj = {};

var cv = document.getElementById('c');
var cx = cv.getContext('2d');

function pick(name) {
  cur = name;
  fi = 0;
  var a = ANIMS[name];
  if (!adj[name]) {
    adj[name] = [];
    for (var i = 0; i < a.n; i++) adj[name].push(0);
  }
  document.querySelectorAll('#anim-btns button').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  img = new Image();
  img.onload = draw;
  img.onerror = function(){ document.getElementById('info').textContent = 'ERROR loading: ' + a.file; };
  img.src = a.file;
}

function sock(i) {
  var o = ORIG[cur];
  var s = o[Math.min(i, o.length - 1)];
  var d = adj[cur][i] || 0;
  var rad = s.angle * Math.PI / 180;
  return {
    x: s.x + Math.round(Math.sin(rad) * d),
    y: s.y + Math.round(-Math.cos(rad) * d),
    angle: s.angle
  };
}

function draw() {
  if (!cur || !img) return;
  var a = ANIMS[cur];
  var dw = Math.round(a.fw * a.sc);
  var dh = Math.round(a.fh * a.sc);
  cv.width = dw * Z;
  cv.height = dh * Z;
  cx.imageSmoothingEnabled = false;
  var col = fi % a.cols;
  var row = Math.floor(fi / a.cols);
  cx.drawImage(img, col*a.fw, row*a.fh, a.fw, a.fh, 0, 0, dw*Z, dh*Z);

  var s = sock(fi);

  if (wimg.complete && wimg.naturalWidth > 0) {
    var ws = 0.55 * Z;
    var ww = wimg.width * ws;
    var wh = wimg.height * ws;
    cx.save();
    cx.globalAlpha = 0.8;
    cx.translate(s.x * Z, s.y * Z);
    cx.rotate(s.angle * Math.PI / 180);
    cx.drawImage(wimg, -ww * (43/wimg.width), -wh * (100/wimg.height), ww, wh);
    cx.restore();
  }

  cx.fillStyle = 'red';
  cx.beginPath();
  cx.arc(s.x * Z, s.y * Z, Z, 0, Math.PI * 2);
  cx.fill();

  var d = adj[cur][fi] || 0;
  document.getElementById('slider').value = Math.max(-30, Math.min(30, d));
  document.getElementById('numbox').value = d;

  var o = ORIG[cur][Math.min(fi, ORIG[cur].length - 1)];
  document.getElementById('info').innerHTML =
    '<b>' + cur.toUpperCase() + '</b> F' + fi + '/' + (a.n-1) +
    ' — Base:(' + o.x + ',' + o.y + ',' + o.angle + '°)' +
    ' → Final:(' + s.x + ',' + s.y + ') shaft=' + d;
}

function slide() {
  if (!cur) return;
  adj[cur][fi] = parseInt(document.getElementById('slider').value);
  document.getElementById('numbox').value = adj[cur][fi];
  draw();
}

function numIn() {
  if (!cur) return;
  adj[cur][fi] = parseInt(document.getElementById('numbox').value) || 0;
  document.getElementById('slider').value = Math.max(-30, Math.min(30, adj[cur][fi]));
  draw();
}

function prev() { if(cur){fi=Math.max(0,fi-1);draw();} }
function next() { if(cur){fi=Math.min(ANIMS[cur].n-1,fi+1);draw();} }

function copyAll() {
  if (!cur) return;
  var v = adj[cur][fi];
  for (var i = 0; i < adj[cur].length; i++) adj[cur][i] = v;
  draw();
}

function resetF() {
  if (!cur) return;
  adj[cur][fi] = 0;
  draw();
}

cv.addEventListener('click', function(e) {
  if (!cur) return;
  var rect = cv.getBoundingClientRect();
  var mx = Math.round((e.clientX - rect.left) / Z);
  var my = Math.round((e.clientY - rect.top) / Z);
  var o = ORIG[cur][Math.min(fi, ORIG[cur].length - 1)];
  var dx = mx - o.x, dy = my - o.y;
  var rad = o.angle * Math.PI / 180;
  var sinA = Math.sin(rad), cosA = -Math.cos(rad);
  var d = Math.round(dx * sinA + dy * cosA);
  adj[cur][fi] = d;
  draw();
});

function doExport() {
  var out = [];
  for (var name in adj) {
    var a = ANIMS[name];
    var o = ORIG[name];
    out.push('// ' + name.toUpperCase() + ' — ' + a.n + ' frames');
    var varName = name === 'smash' ? 'FINAL_SMASH' : name.toUpperCase();
    out.push('export const ' + varName + '_SOCKETS: WeaponSocket[] = [');
    for (var i = 0; i < a.n; i++) {
      var s = sock(i);
      out.push('  {x:' + s.x + ',y:' + s.y + ',angle:' + s.angle + '},');
    }
    out.push('];');
    out.push('');
  }
  document.getElementById('output').textContent = out.join('\n');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'ArrowRight') next();
});
</script>
