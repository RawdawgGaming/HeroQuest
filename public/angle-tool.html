<!DOCTYPE html>
<html>
<head>
<title>Weapon Angle Tool</title>
<style>
  body { background:#1a1a2e; color:#fff; font-family:monospace; margin:20px; }
  canvas { display:block; border:2px solid #444; }
  button { background:#334; color:#fff; border:1px solid #556; padding:8px 16px; cursor:pointer; font-family:monospace; font-size:14px; margin:2px; }
  button:hover { background:#446; }
  button.active { background:#363; border-color:#6a6; }
  .row { margin:8px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  #info { font-size:16px; margin:10px 0; color:#aaf; }
  #output { background:#0a0a1a; padding:15px; border:1px solid #333; white-space:pre; font-size:11px; max-height:400px; overflow-y:auto; margin-top:10px; }
  input[type=range] { width:400px; }
  input[type=number] { width:60px; background:#111; color:#ff0; border:1px solid #555; font-family:monospace; text-align:center; padding:4px; font-size:16px; }
  .angle-display { font-size:24px; color:#ff0; min-width:60px; }
</style>
</head>
<body>
<h2>Weapon Angle Tool — Adjust rotation per frame</h2>
<div class="row" id="anim-btns">
  <button onclick="pick('idle')">IDLE (50)</button>
  <button onclick="pick('run')">RUN (22)</button>
  <button onclick="pick('attack')">ATTACK (84)</button>
  <button onclick="pick('smash')">SMASH (144)</button>
</div>
<div id="info">Select an animation above</div>
<div class="row">
  <button onclick="prev()">← Prev</button>
  <button onclick="next()">Next →</button>
  <span>Angle:</span>
  <input type="range" id="aslider" min="-180" max="180" value="85" oninput="onSlider()">
  <input type="number" id="anum" value="85" oninput="onNum()">
  <span class="angle-display" id="adeg">85°</span>
</div>
<div class="row">
  <button onclick="copyAll()">Copy angle to ALL frames</button>
  <button onclick="copyRemaining()">Copy angle to remaining</button>
  <button onclick="doExport()">Export TypeScript</button>
</div>
<canvas id="c" width="800" height="600"></canvas>
<div id="output">Click "Export TypeScript" to generate</div>

  attack: {file:BASE+'/assets/paladin/paladin_attack_main_v1.png',fw:1056,fh:544,cols:12,n:129,sc:86/320},
  smash:  {file:BASE+'/assets/paladin/paladin_final_smash_v1.png',fw:1056,fh:544,cols:11,n:121,sc:86/320},
};

var SOCKETS = {
  idle: Array.from({length:50},function(){return{x:54,y:64,angle:74}}),

    {x:41,y:53,angle:107},{x:41,y:53,angle:107},{x:41,y:53,angle:108},{x:42,y:57,angle:104},
    {x:43,y:60,angle:98},{x:48,y:63,angle:86},{x:48,y:63,angle:86},{x:54,y:63,angle:73},

    {x:133,y:124},{x:133,y:124},{x:133,y:124},{x:133,y:124},{x:133,y:124},{x:132,y:124},{x:132,y:124},{x:130,y:123},{x:130,y:123},{x:128,y:123},{x:128,y:123},{x:126,y:122},{x:126,y:122},{x:125,y:122},{x:125,y:122},{x:125,y:122},{x:122,y:121},{x:122,y:121},{x:120,y:119},{x:120,y:119},{x:120,y:119},{x:118,y:117},{x:118,y:117},{x:116,y:115},{x:115,y:114},{x:115,y:114},{x:115,y:114},{x:113,y:112},{x:113,y:112},{x:113,y:112},{x:112,y:110},{x:112,y:110},{x:111,y:108},{x:111,y:108},{x:111,y:108},{x:110,y:105},{x:110,y:105},{x:110,y:104},{x:109,y:102},{x:109,y:102},{x:109,y:102},{x:109,y:99},{x:109,y:99},{x:109,y:97},{x:109,y:97},{x:109,y:97},{x:110,y:94},{x:110,y:94},{x:110,y:94},{x:110,y:94},{x:111,y:92},{x:111,y:92},{x:112,y:89},{x:112,y:89},{x:113,y:85},{x:113,y:85},{x:113,y:85},{x:116,y:83},{x:116,y:83},{x:116,y:83},{x:118,y:80},{x:118,y:80},{x:121,y:77},{x:121,y:77},{x:121,y:77},{x:124,y:74},{x:124,y:74},{x:127,y:73},{x:129,y:72},{x:129,y:72},{x:129,y:72},{x:133,y:70},{x:133,y:70},{x:134,y:70},{x:134,y:70},{x:134,y:70},{x:134,y:70},{x:135,y:70},{x:135,y:70},{x:135,y:70},{x:135,y:70},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:135,y:69},{x:143,y:73},{x:143,y:73},{x:156,y:83},{x:156,y:83},{x:156,y:83},{x:176,y:106},{x:176,y:126},{x:174,y:129},{x:174,y:129},{x:174,y:129},{x:173,y:130},{x:171,y:131},{x:171,y:131},{x:171,y:131},{x:170,y:132},{x:170,y:132},{x:166,y:135},{x:163,y:136},{x:158,y:139},{x:158,y:139},{x:159,y:138},{x:155,y:139},{x:155,y:139},{x:155,y:139},{x:153,y:140},{x:152,y:140},{x:152,y:140},{x:152,y:140},{x:152,y:140},{x:151,y:140},{x:151,y:140},{x:151,y:140},{x:151,y:140}
  ],
  smash: [
    {x:178,y:114,angle:85},{x:178,y:115,angle:85},{x:178,y:115,angle:85},{x:178,y:115,angle:85},{x:178,y:115,angle:85},{x:176,y:121,angle:85},{x:173,y:123,angle:85},{x:152,y:97,angle:85},{x:153,y:73,angle:85},{x:153,y:73,angle:85},{x:142,y:66,angle:85},{x:141,y:66,angle:85},{x:135,y:67,angle:85},{x:135,y:67,angle:85},{x:135,y:67,angle:85},{x:131,y:69,angle:85},{x:131,y:69,angle:85},{x:130,y:70,angle:85},{x:130,y:70,angle:85},{x:130,y:70,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:129,y:72,angle:85},{x:130,y:71,angle:85},{x:130,y:71,angle:85},{x:130,y:71,angle:85},{x:132,y:70,angle:85},{x:132,y:70,angle:85},{x:134,y:69,angle:85},{x:134,y:69,angle:85},{x:134,y:69,angle:85},{x:137,y:69,angle:85},{x:137,y:68,angle:85},{x:139,y:67,angle:85},{x:139,y:67,angle:85},{x:139,y:66,angle:85},{x:151,y:65,angle:85},{x:151,y:66,angle:85},{x:176,y:87,angle:85},{x:167,y:94,angle:85},{x:180,y:94,angle:85},{x:181,y:125,angle:85},{x:181,y:125,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85},{x:180,y:141,angle:85}
  ]
};

var Z = 6;
var cur = null;
var fi = 0;
var img = null;
var wimg = new Image();
wimg.src = BASE + '/assets/paladin/Weapons/Oak Mace.png';
var angles = {};

var cv = document.getElementById('c');
var cx = cv.getContext('2d');

function pick(name) {
  cur = name;
  fi = 0;
  var a = ANIMS[name];
  if (!angles[name]) {
    angles[name] = [];
    for (var i = 0; i < a.n; i++) {
      var s = SOCKETS[name][Math.min(i, SOCKETS[name].length-1)];
      angles[name].push(s.angle !== undefined ? s.angle : 85);
    }
  }
  document.querySelectorAll('#anim-btns button').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  img = new Image();
  img.onload = draw;
  img.onerror = function(){ document.getElementById('info').textContent = 'ERROR loading image'; };
  img.src = a.file;
}

function draw() {
  if (!cur || !img) return;
  var a = ANIMS[cur];
  var dw = Math.round(a.fw * a.sc);
  var dh = Math.round(a.fh * a.sc);
  cv.width = dw * Z;
  cv.height = dh * Z;
  cx.imageSmoothingEnabled = false;
  var col = fi % a.cols;
  var row = Math.floor(fi / a.cols);
  cx.drawImage(img, col*a.fw, row*a.fh, a.fw, a.fh, 0, 0, dw*Z, dh*Z);

  var s = SOCKETS[cur][Math.min(fi, SOCKETS[cur].length-1)];
  var angle = angles[cur][fi];

  // Draw weapon preview
  if (wimg.complete && wimg.naturalWidth > 0) {
    var ws = 0.55 * Z;
    var ww = wimg.width * ws;
    var wh = wimg.height * ws;
    cx.save();
    cx.globalAlpha = 0.8;
    cx.translate(s.x * Z, s.y * Z);
    cx.rotate(angle * Math.PI / 180);
    cx.drawImage(wimg, -ww*(43/wimg.width), -wh*(100/wimg.height), ww, wh);
    cx.restore();
  }

  // Red dot
  cx.fillStyle = 'red';
  cx.beginPath();
  cx.arc(s.x * Z, s.y * Z, Z, 0, Math.PI * 2);
  cx.fill();

  // Update controls
  document.getElementById('aslider').value = angle;
  document.getElementById('anum').value = angle;
  document.getElementById('adeg').textContent = angle + '°';

  document.getElementById('info').innerHTML =
    '<b>' + cur.toUpperCase() + '</b> F' + fi + '/' + (a.n-1) +
    ' — Pos:(' + s.x + ',' + s.y + ') — Angle: <b>' + angle + '°</b>';
}

function onSlider() {
  if (!cur) return;
  var v = parseInt(document.getElementById('aslider').value);
  angles[cur][fi] = v;
  document.getElementById('anum').value = v;
  document.getElementById('adeg').textContent = v + '°';
  draw();
}

function onNum() {
  if (!cur) return;
  var v = parseInt(document.getElementById('anum').value) || 0;
  angles[cur][fi] = v;
  document.getElementById('aslider').value = Math.max(-180, Math.min(180, v));
  document.getElementById('adeg').textContent = v + '°';
  draw();
}

function prev() { if(cur){fi=Math.max(0,fi-1);draw();} }
function next() { if(cur){fi=Math.min(ANIMS[cur].n-1,fi+1);draw();} }

function copyAll() {
  if (!cur) return;
  var v = angles[cur][fi];
  for (var i = 0; i < angles[cur].length; i++) angles[cur][i] = v;
  draw();
}

function copyRemaining() {
  if (!cur) return;
  var v = angles[cur][fi];
  for (var i = fi; i < angles[cur].length; i++) angles[cur][i] = v;
  draw();
}

function doExport() {
  var out = [];
  for (var name in angles) {
    var a = ANIMS[name];
    var arr = angles[name];
    var socks = SOCKETS[name];
    var varName = name === 'smash' ? 'FINAL_SMASH' : name.toUpperCase();
    out.push('// ' + name.toUpperCase() + ' — ' + a.n + ' frames');
    out.push('export const ' + varName + '_SOCKETS: WeaponSocket[] = [');
    for (var i = 0; i < a.n; i++) {
      var s = socks[Math.min(i, socks.length-1)];
      out.push('  {x:' + s.x + ',y:' + s.y + ',angle:' + arr[i] + '},');
    }
    out.push('];');
    out.push('');
  }
  document.getElementById('output').textContent = out.join('\n');
}

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowUp') { angles[cur][fi] = Math.min(180, angles[cur][fi]+5); draw(); }
  if (e.key === 'ArrowDown') { angles[cur][fi] = Math.max(-180, angles[cur][fi]-5); draw(); }
});
</script>
</body>
</html>
